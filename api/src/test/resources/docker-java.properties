# Force the docker-java client API version used by Testcontainers.
#
# Docker Engine 29+ (OrbStack 2.x, Docker Desktop 4.52+) enforces a minimum
# API version of 1.40 and rejects clients negotiating 1.32 with HTTP 400
# ("client version 1.32 is too old"). Testcontainers 1.x bundles a docker-java
# that falls back to 1.32, which breaks every Testcontainers integration test.
# docker-java reads this classpath resource and uses it for version negotiation.
#
# Range accepted by current daemons: 1.40 - 1.54.
# Stopgap until Testcontainers 2.x (which negotiates automatically) is adopted.
api.version=1.44
