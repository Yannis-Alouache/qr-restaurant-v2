server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/qr_restaurant}
    username: ${POSTGRES_USER:qr_user}
    password: ${POSTGRES_PASSWORD:qr_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    baseline-version: 4
    baseline-description: legacy-safe-baseline

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  public-key: ${STRIPE_PUBLIC_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

storage:
  seaweedfs:
    s3-endpoint: ${SEAWEEDFS_S3_ENDPOINT:http://localhost:8333}

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldmVsb3BtZW50LWp3dC1zZWNyZXQta2V5LWZvci1xci1yZXN0YXVyYW50LXYy}
  expiration: 2592000000 # 30 jours (par défaut = dev). Override prod ci-dessous.
  cookie:
    secure: ${JWT_COOKIE_SECURE:false} # true en production (HTTPS uniquement)
    same-site: Lax

app:
  client-base-url: ${CLIENT_BASE_URL:http://localhost:4300}
  admin-base-url: ${ADMIN_BASE_URL:http://localhost:4200}

---
spring:
  config:
    activate:
      on-profile: prod
jwt:
  expiration: 604800000 # 7 jours en production
