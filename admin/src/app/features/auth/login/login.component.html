<div class="min-h-screen flex items-center justify-center bg-canvas-white">
  <div class="w-full max-w-sm p-10">
    <h1 class="font-polysans text-heading-sm tracking-tight text-midnight-graphite mb-8">
      Connexion
    </h1>

    @if (error) {
      <div class="mb-6 px-4 py-3 rounded-radius-lg bg-slate-mist text-midnight-graphite text-sm">
        {{ error }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
      <div>
        <label class="block text-sm text-dark-shale mb-1.5">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2.5 rounded-radius-2xl border border-light-pearl bg-canvas-white text-midnight-graphite text-body outline-none focus:border-midnight-graphite transition-colors"
          placeholder="votre@email.com"
        />
      </div>

      <div>
        <label class="block text-sm text-dark-shale mb-1.5">Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2.5 rounded-radius-2xl border border-light-pearl bg-canvas-white text-midnight-graphite text-body outline-none focus:border-midnight-graphite transition-colors"
          placeholder="••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full py-2.5 rounded-radius-2xl bg-midnight-graphite text-canvas-white font-medium text-body hover:opacity-90 transition-opacity disabled:opacity-40"
      >
        @if (loading) {
          Connexion...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="mt-8 text-sm text-dark-shale text-center">
      Pas encore de compte ?
      <a routerLink="/signup" class="text-midnight-graphite underline underline-offset-2 hover:text-sunset-orange transition-colors">
        Créer un compte
      </a>
    </p>
  </div>
</div>
